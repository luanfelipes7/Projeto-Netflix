<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix 2.0</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main>
        <h1>Quem está assitindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles-container">
                <ul class="profiles-group">
                    <!-- Primeira linha de perfis -->
                    <li class="profile-row">
                        <ol class="profiles-list">
                            <li class="profile-item">
                                <a href="#" class="profile">
                                    <figure>
                                        <img src="./assets/Perfil1.png" alt="Mulher viking">
                                        <figcaption>Jessica</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li class="profile-item">
                                <a href="#" class="profile">
                                    <figure>
                                        <img src="./assets/perfil2.jpg" alt="Homem viking com machado na mão">
                                        <figcaption>Felipe</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ol>
                    </li>
                    <!-- Segunda linha de perfis -->
                    <li class="profile-row">
                        <ol class="profiles-list">
                            <li class="profile-item">
                                <a href="#" class="profile">
                                    <figure>
                                        <img src="./assets/Perfil 3.jpg" alt="Apolo, o deus grego do sol, das artes e da arquearia">
                                        <figcaption>Luan</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li class="profile-item">
                                <a href="#" class="profile">
                                    <figure>
                                        <img src="./assets/perfil4.jpg" alt="Imagem represendo Loki, deus nordico da mentira e trapaça">
                                        <figcaption>Sei la</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ol>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
</body>

</html>
